<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TestSite</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
      text-align: center;
      padding: 60px;
    }

    h1 {
      color: #2563eb;
    }

    .card {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    button {
      margin-top: 20px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Сайт працює 🚀</h1>
    <p>Вітаю, ти успішно задеплоїв сайт на Railway.</p>
    <button onclick="alert('Все працює!')">Перевірити кнопку</button>
  </div>
</body>
</html>
